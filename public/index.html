<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiProjector Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="landing-body">
    <div class="glass-container landing-container">
        <h1>PiProjector</h1>
        <p>Select a presentation mode</p>
        
        <div class="card-group">
            <div class="card">
                <h3>Document Upload</h3>
                <p>Upload a PDF to present</p>
                <input type="file" id="file-input" accept=".pdf" style="display: none;" />
                <button class="btn primary-btn" onclick="document.getElementById('file-input').click()">Choose File</button>
                <div id="upload-status" style="margin-top: 10px; font-size: 0.9em;"></div>
            </div>
            
            <div class="card">
                <h3>Live Screen</h3>
                <p>Mirror your display</p>
                <a href="sender.html" class="btn secondary-btn">Share Screen</a>
            </div>
        </div>

        <div style="margin-top: 2rem;">
            <a href="receiver.html" class="status-text" style="color: rgba(255,255,255,0.5); text-decoration: none;">Open Projector Display (Receiver)</a>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const uploadStatus = document.getElementById('upload-status');
        const cardGroup = document.querySelector('.card-group');

        // Check if we are in Setup Mode (AP)
        fetch('/api/ip')
            .then(res => res.json())
            .then(data => {
                if (data.isHotspot) {
                    document.querySelector('h1').textContent = 'PiCaster Setup';
                    document.querySelector('p').textContent = 'Connect to your local Wi-Fi network';
                    
                    // Override the grid layout to center the single card
                    cardGroup.style.gridTemplateColumns = '1fr';
                    
                    cardGroup.innerHTML = `
                        <div class="card" style="width: 100%; max-width: 450px; margin: 0 auto; padding: 2.5rem;">
                            <h3 style="margin-bottom: 1.5rem;">Select Network</h3>
                            <select id="wifi-select" class="btn" style="background: var(--bg-base); border: 1px solid var(--border-color); width: 100%; margin-bottom: 1rem; padding: 0.75rem; color: var(--text-main); appearance: none;">
                                <option>Scanning...</option>
                            </select>
                            <input type="password" id="wifi-password" placeholder="Password" style="width: 100%; padding: 0.75rem; margin-bottom: 1.5rem; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-base); color: var(--text-main); font-family: inherit; font-size: 0.95rem;" />
                            <button id="wifi-connect-btn" class="btn primary-btn" style="width: 100%;">Connect</button>
                            <div id="wifi-status" style="margin-top: 1rem; font-size: 0.9em; color: #10b981; min-height: 1.2em;"></div>
                        </div>
                    `;

                    // Fetch networks
                    const fetchNetworks = () => {
                        fetch('/api/wifi/scan')
                            .then(r => r.json())
                            .then(scanData => {
                                const select = document.getElementById('wifi-select');
                                if (scanData.success && scanData.networks.length > 0) {
                                    select.innerHTML = scanData.networks.map(ssid => `<option value="${ssid}">${ssid}</option>`).join('');
                                } else {
                                    select.innerHTML = '<option>No networks found...</option>';
                                    setTimeout(fetchNetworks, 5000); // Retry scanning
                                }
                            });
                    };
                    fetchNetworks();

                    document.getElementById('wifi-connect-btn').addEventListener('click', () => {
                        const ssid = document.getElementById('wifi-select').value;
                        const password = document.getElementById('wifi-password').value;
                        const status = document.getElementById('wifi-status');
                        
                        status.textContent = 'Saving...';
                        fetch('/api/wifi/connect', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ ssid, password })
                        })
                        .then(r => r.json())
                        .then(res => {
                            if (res.success) {
                                status.textContent = res.message;
                            } else {
                                status.textContent = res.error;
                            }
                        });
                    });
                }
            });

        fileInput.addEventListener('change', async (e) => {
            if (!e.target.files.length) return;
            const file = e.target.files[0];
            
            const formData = new FormData();
            formData.append('presentation', file);

            uploadStatus.textContent = 'Uploading...';
            
            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                if (data.success) {
                    uploadStatus.textContent = 'Success! Redirecting...';
                    setTimeout(() => {
                        window.location.href = 'remote.html';
                    }, 500);
                } else {
                    uploadStatus.textContent = 'Upload failed.';
                }
            } catch (error) {
                console.error(error);
                uploadStatus.textContent = 'Error uploading file.';
            }
        });

        // Mobile constraint check for screen share
        if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
            const liveScreenCard = document.querySelectorAll('.card')[1];
            if (liveScreenCard) {
                const shareBtn = liveScreenCard.querySelector('.btn');
                if (shareBtn) shareBtn.style.display = 'none';
                const msg = document.createElement('p');
                msg.style.color = '#ff6b6b';
                msg.style.fontSize = '0.85em';
                msg.style.marginTop = '10px';
                msg.textContent = 'Screen mirroring requires a desktop/laptop browser.';
                liveScreenCard.appendChild(msg);
            }
        }
    </script>
</body>
</html>
