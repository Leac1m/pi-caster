<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiProjector Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="landing-body">
    <div class="glass-container landing-container">
        <h1>PiProjector</h1>
        <p>Select a presentation mode</p>
        
        <div class="card-group">
            <div class="card">
                <h3>Document Upload</h3>
                <p>Upload a PDF to present</p>
                <input type="file" id="file-input" accept=".pdf" style="display: none;" />
                <button class="btn primary-btn" onclick="document.getElementById('file-input').click()">Choose File</button>
                <div id="upload-status" style="margin-top: 10px; font-size: 0.9em;"></div>
            </div>
            
            <div class="card">
                <h3>Live Screen</h3>
                <p>Mirror your display</p>
                <a href="sender.html" class="btn secondary-btn">Share Screen</a>
            </div>
        </div>

        <div style="margin-top: 2rem;">
            <a href="receiver.html" class="status-text" style="color: rgba(255,255,255,0.5); text-decoration: none;">Open Projector Display (Receiver)</a>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const uploadStatus = document.getElementById('upload-status');

        fileInput.addEventListener('change', async (e) => {
            if (!e.target.files.length) return;
            const file = e.target.files[0];
            
            const formData = new FormData();
            formData.append('presentation', file);

            uploadStatus.textContent = 'Uploading...';
            
            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                if (data.success) {
                    uploadStatus.textContent = 'Success! Redirecting...';
                    setTimeout(() => {
                        window.location.href = 'remote.html';
                    }, 500);
                } else {
                    uploadStatus.textContent = 'Upload failed.';
                }
            } catch (error) {
                console.error(error);
                uploadStatus.textContent = 'Error uploading file.';
            }
        });

        // Mobile constraint check for screen share
        if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
            const liveScreenCard = document.querySelectorAll('.card')[1];
            if (liveScreenCard) {
                const shareBtn = liveScreenCard.querySelector('.btn');
                if (shareBtn) shareBtn.style.display = 'none';
                const msg = document.createElement('p');
                msg.style.color = '#ff6b6b';
                msg.style.fontSize = '0.85em';
                msg.style.marginTop = '10px';
                msg.textContent = 'Screen mirroring requires a desktop/laptop browser.';
                liveScreenCard.appendChild(msg);
            }
        }
    </script>
</body>
</html>
