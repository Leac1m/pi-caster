<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiProjector - Receiver</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/meshesha/PPTXjs@1.21.1/css/pptxjs.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/2.6.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/4.13.0/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nvd3/1.8.6/nv.d3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/meshesha/PPTXjs@1.21.1/js/pptxjs.min.js"></script>
    <style>
        #pdf-render {
            display: none;
            max-width: 100%;
            max-height: 100%;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body class="receiver-body">
    <div id="video-container">
        <div class="waiting-overlay" id="waiting-overlay">
            <div class="spinner"></div>
            <h1>PiProjector is Ready</h1>
            <p>Waiting for a connection or presentation...</p>
            <div id="qrcode" style="margin-top: 20px; background: white; padding: 10px; border-radius: 10px; display: none;"></div>
            <p id="ip-text" style="margin-top: 10px; font-size: 0.9em; opacity: 0.8;"></p>
        </div>
        <video id="remote-video" autoplay playsinline></video>
        <canvas id="pdf-render"></canvas>
        <div id="pptx-render" style="width: 100%; height: 100%; display: none; background: transparent;"></div>
    </div>

    <script>
        window.FileReaderJS = {
            setSync: function() {},
            setupInput: function() {},
            setupDrop: function() {},
            setupBlob: function(blob, options) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    if (options.on && options.on.load) {
                        options.on.load(e, blob);
                    }
                };
                if (options.readAsDefault === "ArrayBuffer") {
                    reader.readAsArrayBuffer(blob);
                } else {
                    reader.readAsText(blob);
                }
            }
        };
        
        const socket = io({
            reconnection: true,
            reconnectionAttempts: Infinity,
            reconnectionDelay: 1000,
            reconnectionDelayMax: 5000
        });
        let peerConnection;
        const remoteVideo = document.getElementById('remote-video');
        const pdfCanvas = document.getElementById('pdf-render');
        const pdfCtx = pdfCanvas.getContext('2d');
        const waitingOverlay = document.getElementById('waiting-overlay');

        const configuration = {
            'iceServers': [{'urls': 'stun:stun.l.google.com:19302'}]
        };

        socket.on('connect', () => {
            console.log("Connected to signaling server");
            socket.emit('register-receiver');

            fetch('/api/ip')
                .then(res => res.json())
                .then(data => {
                    const titleText = document.querySelector('#waiting-overlay h1');
                    const subtitleText = document.querySelector('#waiting-overlay p');
                    const qrContainer = document.getElementById('qrcode');
                    const ipText = document.getElementById('ip-text');
                    
                    if (data.isHotspot) {
                        titleText.textContent = "Network Setup Required";
                        subtitleText.innerHTML = "1. Connect your Wi-Fi to <b>PiCaster-Setup</b><br>2. Navigate to <b>http://10.42.0.1</b>";
                        qrContainer.style.display = 'none';
                        ipText.style.display = 'none';
                    } else {
                        titleText.textContent = "PiProjector is Ready";
                        subtitleText.textContent = "Waiting for a connection or presentation...";
                        
                        const port = window.location.port ? ':' + window.location.port : '';
                        const url = `https://${data.ip}/`;
                        
                        ipText.textContent = `Connect at: ${url}`;
                        ipText.style.display = 'block';
                        qrContainer.style.display = 'block';
                        qrContainer.innerHTML = '';
                        new QRCode(qrContainer, {
                            text: url,
                            width: 150,
                            height: 150,
                            colorDark : "#000000",
                            colorLight : "#ffffff",
                            correctLevel : QRCode.CorrectLevel.H
                        });
                    }
                })
                .catch(err => console.error('Failed to get IP for QR code', err));
        });

        // Presentation State
        let pdfDoc = null,
            pageNum = 1,
            pageIsRendering = false,
            pageNumIsPending = null;

        let isPptx = false;
        let totalPptxSlides = 1;

        // Safely initialize PDF.js
        const pdfJS = window.pdfjsLib || window['pdfjs-dist/build/pdf'];
        if (pdfJS) {
            pdfJS.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        } else {
            console.error("PDF.js failed to load from CDN.");
        }

        /* --- PDF Presentation Logic --- */
        const renderPage = num => {
            pageIsRendering = true;

            pdfDoc.getPage(num).then(page => {
                const viewport = page.getViewport({ scale: 2 });
                pdfCanvas.height = viewport.height;
                pdfCanvas.width = viewport.width;

                const renderCtx = {
                    canvasContext: pdfCtx,
                    viewport: viewport
                };

                page.render(renderCtx).promise.then(() => {
                    pageIsRendering = false;
                    if (pageNumIsPending !== null) {
                        renderPage(pageNumIsPending);
                        pageNumIsPending = null;
                    }
                });
            });
        };

        const queueRenderPage = num => {
            if (pageIsRendering) {
                pageNumIsPending = num;
            } else {
                renderPage(num);
            }
        };

        socket.on('presentation-start', (data) => {
            console.log("Starting presentation:", data.fileUrl);
            resetVideo();
            waitingOverlay.classList.add('hidden');
            remoteVideo.style.display = 'none';
            pdfCanvas.style.display = 'none';
            document.getElementById('pptx-render').style.display = 'none';

            isPptx = data.fileUrl.toLowerCase().endsWith('.pptx');
            pageNum = data.slide || 1;

            if (isPptx) {
                const pptxDiv = $('#pptx-render');
                pptxDiv.empty();
                pptxDiv.show();

                pptxDiv.pptxToHtml({
                    pptxFileUrl: data.fileUrl,
                    slideMode: false,
                    keyBoardShortCut: false,
                    slideModeConfig: {
                        first: 1, 
                        nav: false,
                        showPlayPauseBtn: false,
                        showSlideNum: false, 
                        showTotalSlideNum: false, 
                        autoSlide: false, 
                        randomAutoSlide: false, 
                        loop: false, 
                        background: "transparent", 
                        transition: "default"
                    }
                });

                // Poll for slides rendering
                const checkReady = setInterval(() => {
                    const slides = $('#pptx-render .slide');
                    if (slides.length > 0) {
                        clearInterval(checkReady);
                        totalPptxSlides = slides.length;
                        renderPptxSlide(pageNum);
                    }
                }, 500);

            } else if (pdfJS) {
                pdfCanvas.style.display = 'block';
                pdfJS.getDocument(data.fileUrl).promise.then(doc => {
                    pdfDoc = doc;
                    renderPage(pageNum);
                }).catch(err => {
                    console.error("Error loading PDF", err);
                    resetAll();
                });
            } else {
                console.error("Cannot load presentation, PDF.js not initialized.");
                resetAll();
            }
        });

        const renderPptxSlide = (num) => {
            const slides = $('#pptx-render .slide');
            slides.hide();
            if (slides[num - 1]) {
                $(slides[num - 1]).show();
            }
        };

        socket.on('slide-next', () => {
            if (isPptx && pageNum < totalPptxSlides) {
                pageNum++;
                renderPptxSlide(pageNum);
            } else if (!isPptx && pdfDoc && pageNum < pdfDoc.numPages) {
                pageNum++;
                queueRenderPage(pageNum);
            }
        });

        socket.on('slide-prev', () => {
            if (isPptx && pageNum > 1) {
                pageNum--;
                renderPptxSlide(pageNum);
            } else if (!isPptx && pdfDoc && pageNum > 1) {
                pageNum--;
                queueRenderPage(pageNum);
            }
        });

        socket.on('presentation-stop', () => {
            console.log("Stopping presentation");
            resetAll();
        });


        /* --- WebRTC Screen Share Logic --- */
        socket.on('offer', async (data) => {
            console.log('Received offer from', data.senderId);
            
            if (peerConnection) {
                peerConnection.close();
            }

            peerConnection = new RTCPeerConnection(configuration);

            peerConnection.ontrack = event => {
                console.log('Received track');
                if (remoteVideo.srcObject !== event.streams[0]) {
                    // Only reset the PDF display, DO NOT reset the video/connection!
                    pdfDoc = null;
                    pdfCtx.clearRect(0, 0, pdfCanvas.width, pdfCanvas.height);
                    pdfCanvas.style.display = 'none';
                    
                    remoteVideo.style.display = 'block';
                    remoteVideo.srcObject = event.streams[0];
                    waitingOverlay.classList.add('hidden');
                }
            };

            peerConnection.onicecandidate = event => {
                if (event.candidate) {
                    socket.emit('ice-candidate', { targetId: data.senderId, candidate: event.candidate });
                }
            };

            peerConnection.onconnectionstatechange = () => {
                if (peerConnection.connectionState === 'disconnected' || peerConnection.connectionState === 'failed') {
                    resetAll();
                }
            };

            try {
                await peerConnection.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp: data.sdp }));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                
                socket.emit('answer', { sdp: peerConnection.localDescription.sdp, senderId: data.senderId });
            } catch (e) {
                console.error("Error handling offer", e);
            }
        });

        socket.on('ice-candidate', async (data) => {
            try {
                if (peerConnection && data.candidate) {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                }
            } catch (e) {
                console.error('Error adding received ice candidate', e);
            }
        });

        function resetVideo() {
            remoteVideo.srcObject = null;
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
        }

        function resetAll() {
            resetVideo();
            pdfDoc = null;
            isPptx = false;
            pdfCtx.clearRect(0, 0, pdfCanvas.width, pdfCanvas.height);
            pdfCanvas.style.display = 'none';
            document.getElementById('pptx-render').style.display = 'none';
            $('#pptx-render').empty();
            remoteVideo.style.display = 'block'; // reset to default
            waitingOverlay.classList.remove('hidden');
        }
    </script>
</body>
</html>
