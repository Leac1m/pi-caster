<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiProjector - Receiver</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="/vendor/pdf.min.js"></script>
    <script src="/vendor/qrcode.min.js"></script>
    <link rel="stylesheet" href="/vendor/pptxjs.css">
    <script src="/vendor/jquery.min.js"></script>
    <script src="/vendor/jszip.min.js"></script>
    <script src="/vendor/d3.min.js"></script>
    <script src="/vendor/nv.d3.min.js"></script>
    <script src="/vendor/pptxjs.min.js"></script>
    <style>
        #pdf-render {
            display: none;
            max-width: 100%;
            max-height: 100%;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body class="receiver-body">
    <div id="video-container">
        <div class="waiting-overlay" id="waiting-overlay">
            <div class="spinner" id="connecting-spinner"></div>
            <h1 id="overlay-title">PiProjector is Starting…</h1>
            <p id="overlay-subtitle">Waiting for server to come online…</p>
            <div id="qrcode" style="margin-top: 20px; background: white; padding: 10px; border-radius: 10px; display: none;"></div>
            <p id="ip-text" style="margin-top: 10px; font-size: 0.9em; opacity: 0.8; display: none;"></p>
        </div>
        <video id="remote-video" autoplay playsinline></video>
        <canvas id="pdf-render"></canvas>
        <div id="pptx-render" style="width: 100%; height: 100%; display: none; background: transparent;"></div>
    </div>

    <script>
        window.FileReaderJS = {
            setSync: function() {},
            setupInput: function() {},
            setupDrop: function() {},
            setupBlob: function(blob, options) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    if (options.on && options.on.load) {
                        options.on.load(e, blob);
                    }
                };
                if (options.readAsDefault === "ArrayBuffer") {
                    reader.readAsArrayBuffer(blob);
                } else {
                    reader.readAsText(blob);
                }
            }
        };
        
        const socket = io({
            reconnection: true,
            reconnectionAttempts: Infinity,
            reconnectionDelay: 1000,
            reconnectionDelayMax: 5000
        });
        let peerConnection;
        const remoteVideo = document.getElementById('remote-video');
        const pdfCanvas = document.getElementById('pdf-render');
        const pdfCtx = pdfCanvas.getContext('2d');
        const waitingOverlay = document.getElementById('waiting-overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlaySubtitle = document.getElementById('overlay-subtitle');
        const qrContainer = document.getElementById('qrcode');
        const ipText = document.getElementById('ip-text');
        const connectingSpinner = document.getElementById('connecting-spinner');

        const WIFI_PAYLOAD = 'WIFI:T:WPA;S:PiCaster;P:picaster2026;;';

        const configuration = {
            'iceServers': [{'urls': 'stun:stun.l.google.com:19302'}]
        };

        // Show QR immediately — hotspot credentials are static.
        // The dynamic IP (for non-hotspot mode) is fetched below.
        function showReadyState(localIp) {
            connectingSpinner.style.display = 'none';
            overlayTitle.textContent = 'PiProjector is Ready';
            overlaySubtitle.textContent = 'Scan to join PiCaster Wi-Fi and start casting';
            qrContainer.style.display = 'block';
            qrContainer.innerHTML = '';
            new QRCode(qrContainer, {
                text: WIFI_PAYLOAD,
                width: 250,
                height: 250,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.M,
            });
            if (localIp && localIp !== 'localhost') {
                ipText.textContent = `Server IP: ${localIp}  •  Or join 'PiCaster' Wi-Fi (Password: picaster2026)`;
            } else {
                ipText.textContent = "Or manually join 'PiCaster' Wi-Fi (Password: picaster2026)";
            }
            ipText.style.display = 'block';
        }

        // Try to fetch the server's IP; if server is down this is a no-op.
        // The QR is always shown regardless — hotspot creds are static.
        async function fetchServerIp() {
            try {
                const res = await fetch('/api/ip');
                if (!res.ok) throw new Error('server error');
                const data = await res.json();
                showReadyState(data.ip);
            } catch (_) {
                // Server not reachable yet — show QR with no dynamic IP.
                // Socket.io will eventually connect and call showReadyState again
                // with the real IP if the server comes up.
                console.warn('Server not reachable yet — showing QR with static credentials.');
                showReadyState(null);
            }
        }

        socket.on('connect', () => {
            console.log('Connected to signaling server');
            socket.emit('register-receiver');
            fetchServerIp();
        });

        socket.on('disconnect', () => {
            console.log('Disconnected from signaling server');
        });

        // If socket was already connected before this script ran (page reload mid-session),
        // the 'connect' event already fired. Handle that case.
        if (socket.connected) {
            socket.emit('register-receiver');
            fetchServerIp();
        } else {
            // Server is not yet reachable — show QR immediately with static hotspot creds
            // so the display is never blank/dark while waiting for the server to boot.
            showReadyState(null);
        }

        // Presentation State
        let pdfDoc = null,
            pageNum = 1,
            pageIsRendering = false,
            pageNumIsPending = null;

        let isPptx = false;
        let totalPptxSlides = 1;

        // Safely initialize PDF.js
        const pdfJS = window.pdfjsLib || window['pdfjs-dist/build/pdf'];
        if (pdfJS) {
            pdfJS.GlobalWorkerOptions.workerSrc = '/vendor/pdf.worker.min.js';
        } else {
            console.error("PDF.js failed to load from CDN.");
        }

        /* --- PDF Presentation Logic --- */
        const renderPage = num => {
            pageIsRendering = true;

            pdfDoc.getPage(num).then(page => {
                const viewport = page.getViewport({ scale: 2 });
                pdfCanvas.height = viewport.height;
                pdfCanvas.width = viewport.width;

                const renderCtx = {
                    canvasContext: pdfCtx,
                    viewport: viewport
                };

                page.render(renderCtx).promise.then(() => {
                    pageIsRendering = false;
                    if (pageNumIsPending !== null) {
                        renderPage(pageNumIsPending);
                        pageNumIsPending = null;
                    }
                });
            });
        };

        const queueRenderPage = num => {
            if (pageIsRendering) {
                pageNumIsPending = num;
            } else {
                renderPage(num);
            }
        };

        socket.on('presentation-start', (data) => {
            console.log("Starting presentation:", data.fileUrl);
            resetVideo();
            waitingOverlay.classList.add('hidden');
            remoteVideo.style.display = 'none';
            pdfCanvas.style.display = 'none';
            document.getElementById('pptx-render').style.display = 'none';

            isPptx = data.fileUrl.toLowerCase().endsWith('.pptx');
            pageNum = data.slide || 1;

            if (isPptx) {
                const pptxDiv = $('#pptx-render');
                pptxDiv.empty();
                pptxDiv.show();

                pptxDiv.pptxToHtml({
                    pptxFileUrl: data.fileUrl,
                    slideMode: false,
                    keyBoardShortCut: false,
                    slideModeConfig: {
                        first: 1, 
                        nav: false,
                        showPlayPauseBtn: false,
                        showSlideNum: false, 
                        showTotalSlideNum: false, 
                        autoSlide: false, 
                        randomAutoSlide: false, 
                        loop: false, 
                        background: "transparent", 
                        transition: "default"
                    }
                });

                // Poll for slides rendering
                const checkReady = setInterval(() => {
                    const slides = $('#pptx-render .slide');
                    if (slides.length > 0) {
                        clearInterval(checkReady);
                        totalPptxSlides = slides.length;
                        renderPptxSlide(pageNum);
                    }
                }, 500);

            } else if (pdfJS) {
                pdfCanvas.style.display = 'block';
                pdfJS.getDocument(data.fileUrl).promise.then(doc => {
                    pdfDoc = doc;
                    renderPage(pageNum);
                }).catch(err => {
                    console.error("Error loading PDF", err);
                    resetAll();
                });
            } else {
                console.error("Cannot load presentation, PDF.js not initialized.");
                resetAll();
            }
        });

        const renderPptxSlide = (num) => {
            const slides = $('#pptx-render .slide');
            slides.hide();
            const slide = slides[num - 1];
            if (slide) {
                $(slide).show();
                scalePptxSlide(slide);
            }
        };

        const scalePptxSlide = (slide) => {
            const container = document.getElementById('pptx-render');
            const slideWidth = slide.offsetWidth || 960;
            const slideHeight = slide.offsetHeight || 720;
            
            const containerWidth = container.clientWidth;
            const containerHeight = container.clientHeight;
            
            const scale = Math.min(containerWidth / slideWidth, containerHeight / slideHeight);
            
            slide.style.transformOrigin = 'top left';
            slide.style.transform = `scale(${scale})`;
            
            // Center the scaled slide
            const scaledWidth = slideWidth * scale;
            const scaledHeight = slideHeight * scale;
            const offsetX = (containerWidth - scaledWidth) / 2;
            const offsetY = (containerHeight - scaledHeight) / 2;
            
            slide.style.position = 'absolute';
            slide.style.left = `${offsetX}px`;
            slide.style.top = `${offsetY}px`;
        };

        window.addEventListener('resize', () => {
            if (isPptx) {
                const slides = $('#pptx-render .slide');
                if (slides[pageNum - 1]) {
                    scalePptxSlide(slides[pageNum - 1]);
                }
            }
        });

        socket.on('slide-next', () => {
            if (isPptx && pageNum < totalPptxSlides) {
                pageNum++;
                renderPptxSlide(pageNum);
            } else if (!isPptx && pdfDoc && pageNum < pdfDoc.numPages) {
                pageNum++;
                queueRenderPage(pageNum);
            }
        });

        socket.on('slide-prev', () => {
            if (isPptx && pageNum > 1) {
                pageNum--;
                renderPptxSlide(pageNum);
            } else if (!isPptx && pdfDoc && pageNum > 1) {
                pageNum--;
                queueRenderPage(pageNum);
            }
        });

        socket.on('presentation-stop', () => {
            console.log("Stopping presentation");
            resetAll();
        });


        /* --- WebRTC Screen Share Logic --- */
        socket.on('offer', async (data) => {
            console.log('Received offer from', data.senderId);
            
            if (peerConnection) {
                peerConnection.close();
            }

            peerConnection = new RTCPeerConnection(configuration);

            peerConnection.ontrack = event => {
                console.log('Received track');
                if (remoteVideo.srcObject !== event.streams[0]) {
                    // Only reset the PDF display, DO NOT reset the video/connection!
                    pdfDoc = null;
                    pdfCtx.clearRect(0, 0, pdfCanvas.width, pdfCanvas.height);
                    pdfCanvas.style.display = 'none';
                    
                    remoteVideo.style.display = 'block';
                    remoteVideo.srcObject = event.streams[0];
                    waitingOverlay.classList.add('hidden');
                }
            };

            peerConnection.onicecandidate = event => {
                if (event.candidate) {
                    socket.emit('ice-candidate', { targetId: data.senderId, candidate: event.candidate });
                }
            };

            peerConnection.onconnectionstatechange = () => {
                if (peerConnection.connectionState === 'disconnected' || peerConnection.connectionState === 'failed') {
                    resetAll();
                }
            };

            try {
                await peerConnection.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp: data.sdp }));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                
                socket.emit('answer', { sdp: peerConnection.localDescription.sdp, senderId: data.senderId });
            } catch (e) {
                console.error("Error handling offer", e);
            }
        });

        socket.on('ice-candidate', async (data) => {
            try {
                if (peerConnection && data.candidate) {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                }
            } catch (e) {
                console.error('Error adding received ice candidate', e);
            }
        });

        function resetVideo() {
            remoteVideo.srcObject = null;
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
        }

        function resetAll() {
            resetVideo();
            pdfDoc = null;
            isPptx = false;
            pdfCtx.clearRect(0, 0, pdfCanvas.width, pdfCanvas.height);
            pdfCanvas.style.display = 'none';
            document.getElementById('pptx-render').style.display = 'none';
            $('#pptx-render').empty();
            remoteVideo.style.display = 'block'; // reset to default
            waitingOverlay.classList.remove('hidden');
        }

        // Kiosk escape: ESC or Ctrl+Shift+Escape calls the server exit endpoint.
        // On success the kiosk Chromium process is killed and the desktop is restored.
        const KIOSK_EXIT_TOKEN = 'pi-caster-kiosk-exit'; // matches server.js default

        async function exitKiosk() {
            try {
                const res = await fetch('/api/exit-kiosk', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Exit-Token': KIOSK_EXIT_TOKEN,
                    },
                });
                if (!res.ok) {
                    console.warn('Kiosk exit returned', res.status);
                }
            } catch (err) {
                console.error('Kiosk exit failed:', err);
            }
        }

        document.addEventListener('keydown', (e) => {
            // Ctrl + Shift + Escape  OR  plain Escape — both trigger exit
            if ((e.ctrlKey && e.shiftKey && e.key === 'Escape') || e.key === 'Escape') {
                e.preventDefault();
                console.log('Kiosk escape triggered.');
                exitKiosk();
                // Fallback: also try window.close() in case this isn't true kiosk mode
                setTimeout(() => { try { window.close(); } catch (_) {} }, 500);
            }
        });
    </script>
</body>
</html>
