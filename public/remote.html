<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiProjector Remote</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="/vendor/pdf.min.js"></script>
    <link rel="stylesheet" href="/vendor/pptxjs.css">
    <script src="/vendor/jquery.min.js"></script>
    <script src="/vendor/jszip.min.js"></script>
    <script src="/vendor/d3.min.js"></script>
    <script src="/vendor/nv.d3.min.js"></script>
    <script src="/vendor/pptxjs.min.js"></script>
</head>
<body class="landing-body" style="align-items: stretch; margin: 0; padding: 0;">
    <div class="remote-container" style="display: flex; flex-direction: column; height: 100vh;">
        <header class="remote-header" style="flex: 0 0 auto;">
            <h2>Remote Control</h2>
            <button id="btn-stop" class="btn danger-btn">Stop</button>
        </header>
        
        <div class="remote-controls">
            <div id="preview-wrapper" class="preview-wrapper">
                <div class="preview-inner">
                    <canvas id="pdf-preview"></canvas>
                    <div id="pptx-preview" style="width: 100%; height: 100%; display: none; background: transparent;"></div>
                    <p id="preview-loading">Loading Preview...</p>
                </div>
            </div>
            
            <div class="remote-button-group">
                <button id="btn-prev" class="btn secondary-btn control-btn">Previous</button>
                <button id="btn-next" class="btn primary-btn control-btn">Next</button>
            </div>
        </div>
    </div>

    <script>
        window.FileReaderJS = {
            setSync: function() {},
            setupInput: function() {},
            setupDrop: function() {},
            setupBlob: function(blob, options) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    if (options.on && options.on.load) {
                        options.on.load(e, blob);
                    }
                };
                if (options.readAsDefault === "ArrayBuffer") {
                    reader.readAsArrayBuffer(blob);
                } else {
                    reader.readAsText(blob);
                }
            }
        };
        
        const socket = io({
            reconnection: true,
            reconnectionAttempts: Infinity,
            reconnectionDelay: 1000,
            reconnectionDelayMax: 5000
        });

        const headerTitle = document.querySelector('.remote-header h2');
        const pdfCanvas = document.getElementById('pdf-preview');
        const pdfCtx = pdfCanvas.getContext('2d');
        const loadingText = document.getElementById('preview-loading');

        // PDF State
        let pdfDoc = null,
            pageNum = 1,
            pageIsRendering = false,
            pageNumIsPending = null;

        // Presentation State
        let isPptx = false;
        let totalPptxSlides = 1;

        const pdfJS = window.pdfjsLib || window['pdfjs-dist/build/pdf'];
        if (pdfJS) {
            pdfJS.GlobalWorkerOptions.workerSrc = '/vendor/pdf.worker.min.js';
        }

        const renderPage = num => {
            if (!pdfDoc) return;
            pageIsRendering = true;

            pdfDoc.getPage(num).then(page => {
                const viewport = page.getViewport({ scale: 1.5 });
                pdfCanvas.height = viewport.height;
                pdfCanvas.width = viewport.width;

                const renderCtx = {
                    canvasContext: pdfCtx,
                    viewport: viewport
                };

                page.render(renderCtx).promise.then(() => {
                    pageIsRendering = false;
                    loadingText.style.display = 'none';
                    pdfCanvas.style.display = 'block';

                    if (pageNumIsPending !== null) {
                        renderPage(pageNumIsPending);
                        pageNumIsPending = null;
                    }
                });
            });
        };

        const queueRenderPage = num => {
            if (pageIsRendering) {
                pageNumIsPending = num;
            } else {
                renderPage(num);
            }
        };

        socket.on('connect', () => {
            headerTitle.textContent = 'Remote Control';
            socket.emit('register-remote');
        });

        socket.on('disconnect', () => {
            headerTitle.textContent = 'Disconnected...';
        });

        socket.io.on('reconnect_attempt', () => {
            headerTitle.textContent = 'Reconnecting...';
        });

        socket.on('presentation-start', (data) => {
            isPptx = data.fileUrl.toLowerCase().endsWith('.pptx');
            pageNum = data.slide || 1;

            loadingText.style.display = 'block';
            pdfCanvas.style.display = 'none';
            document.getElementById('pptx-preview').style.display = 'none';

            if (isPptx) {
                const pptxDiv = $('#pptx-preview');
                pptxDiv.empty();
                pptxDiv.show();

                pptxDiv.pptxToHtml({
                    pptxFileUrl: data.fileUrl,
                    slideMode: false,
                    keyBoardShortCut: false,
                    slideModeConfig: {
                        first: 1, 
                        nav: false,
                        showPlayPauseBtn: false,
                        showSlideNum: false, 
                        showTotalSlideNum: false, 
                        autoSlide: false, 
                        randomAutoSlide: false, 
                        loop: false, 
                        background: "transparent", 
                        transition: "default"
                    }
                });

                // Poll for slides rendering
                const checkReady = setInterval(() => {
                    const slides = $('#pptx-preview .slide');
                    if (slides.length > 0) {
                        clearInterval(checkReady);
                        totalPptxSlides = slides.length;
                        loadingText.style.display = 'none';
                        renderPptxSlide(pageNum);
                    }
                }, 500);

            } else if (pdfJS) {
                pdfCanvas.style.display = 'block';
                pdfJS.getDocument(data.fileUrl).promise.then(doc => {
                    pdfDoc = doc;
                    renderPage(pageNum);
                }).catch(err => {
                    console.error("Error loading PDF preview", err);
                    loadingText.textContent = "Preview unavailable";
                });
            }
        });

        const renderPptxSlide = (num) => {
            const slides = $('#pptx-preview .slide');
            slides.hide();
            const slide = slides[num - 1];
            if (slide) {
                $(slide).show();
                scalePptxSlide(slide);
            }
        };

        const scalePptxSlide = (slide) => {
            const container = document.getElementById('pptx-preview');
            // Assuming standard 960x720 if not readable, PPTXjs sets inline dimensions
            const slideWidth = slide.offsetWidth || 960;
            const slideHeight = slide.offsetHeight || 720;
            
            const containerWidth = container.clientWidth;
            const containerHeight = container.clientHeight;
            
            const scale = Math.min(containerWidth / slideWidth, containerHeight / slideHeight);
            
            slide.style.transformOrigin = 'top left';
            slide.style.transform = `scale(${scale})`;
            
            // Center the scaled slide
            const scaledWidth = slideWidth * scale;
            const scaledHeight = slideHeight * scale;
            const offsetX = (containerWidth - scaledWidth) / 2;
            const offsetY = (containerHeight - scaledHeight) / 2;
            
            slide.style.position = 'absolute';
            slide.style.left = `${offsetX}px`;
            slide.style.top = `${offsetY}px`;
        };

        window.addEventListener('resize', () => {
            if (isPptx) {
                const slides = $('#pptx-preview .slide');
                if (slides[pageNum - 1]) {
                    scalePptxSlide(slides[pageNum - 1]);
                }
            }
        });

        document.getElementById('btn-next').addEventListener('click', () => {
            socket.emit('slide-next');
            if (isPptx && pageNum < totalPptxSlides) {
                pageNum++;
                renderPptxSlide(pageNum);
            } else if (!isPptx && pdfDoc && pageNum < pdfDoc.numPages) {
                pageNum++;
                queueRenderPage(pageNum);
            }
            if(navigator.vibrate) navigator.vibrate(50);
        });

        document.getElementById('btn-prev').addEventListener('click', () => {
            socket.emit('slide-prev');
            if (isPptx && pageNum > 1) {
                pageNum--;
                renderPptxSlide(pageNum);
            } else if (!isPptx && pdfDoc && pageNum > 1) {
                pageNum--;
                queueRenderPage(pageNum);
            }
            if(navigator.vibrate) navigator.vibrate(50);
        });

        document.getElementById('btn-stop').addEventListener('click', () => {
            socket.emit('presentation-stop');
            window.location.href = 'index';
        });

        // Keyboard Shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
                e.preventDefault(); // prevent scrolling
                document.getElementById('btn-next').click();
            } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
                e.preventDefault();
                document.getElementById('btn-prev').click();
            }
        });
    </script>
</body>
</html>
