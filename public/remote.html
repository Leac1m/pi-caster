<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiProjector Remote</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>
<body class="landing-body" style="align-items: stretch; margin: 0; padding: 0;">
    <div class="remote-container" style="display: flex; flex-direction: column; height: 100vh;">
        <header class="remote-header" style="flex: 0 0 auto;">
            <h2>Remote Control</h2>
            <button id="btn-stop" class="btn danger-btn">Stop</button>
        </header>
        
        <div class="remote-controls">
            <div id="preview-wrapper" class="preview-wrapper">
                <div class="preview-inner">
                    <canvas id="pdf-preview"></canvas>
                    <p id="preview-loading">Loading Preview...</p>
                </div>
            </div>
            
            <div class="remote-button-group">
                <button id="btn-prev" class="btn secondary-btn control-btn">Previous</button>
                <button id="btn-next" class="btn primary-btn control-btn">Next</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io({
            reconnection: true,
            reconnectionAttempts: Infinity,
            reconnectionDelay: 1000,
            reconnectionDelayMax: 5000
        });

        const headerTitle = document.querySelector('.remote-header h2');
        const pdfCanvas = document.getElementById('pdf-preview');
        const pdfCtx = pdfCanvas.getContext('2d');
        const loadingText = document.getElementById('preview-loading');

        // PDF State
        let pdfDoc = null,
            pageNum = 1,
            pageIsRendering = false,
            pageNumIsPending = null;

        const pdfJS = window.pdfjsLib || window['pdfjs-dist/build/pdf'];
        if (pdfJS) {
            pdfJS.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        }

        const renderPage = num => {
            if (!pdfDoc) return;
            pageIsRendering = true;

            pdfDoc.getPage(num).then(page => {
                const viewport = page.getViewport({ scale: 1.5 });
                pdfCanvas.height = viewport.height;
                pdfCanvas.width = viewport.width;

                const renderCtx = {
                    canvasContext: pdfCtx,
                    viewport: viewport
                };

                page.render(renderCtx).promise.then(() => {
                    pageIsRendering = false;
                    loadingText.style.display = 'none';
                    pdfCanvas.style.display = 'block';

                    if (pageNumIsPending !== null) {
                        renderPage(pageNumIsPending);
                        pageNumIsPending = null;
                    }
                });
            });
        };

        const queueRenderPage = num => {
            if (pageIsRendering) {
                pageNumIsPending = num;
            } else {
                renderPage(num);
            }
        };

        socket.on('connect', () => {
            headerTitle.textContent = 'Remote Control';
            socket.emit('register-remote');
        });

        socket.on('disconnect', () => {
            headerTitle.textContent = 'Disconnected...';
        });

        socket.io.on('reconnect_attempt', () => {
            headerTitle.textContent = 'Reconnecting...';
        });

        socket.on('presentation-start', (data) => {
            if (pdfJS) {
                loadingText.style.display = 'block';
                pdfCanvas.style.display = 'none';
                
                pdfJS.getDocument(data.fileUrl).promise.then(doc => {
                    pdfDoc = doc;
                    pageNum = data.slide || 1; // Start at the server's current slide
                    renderPage(pageNum);
                }).catch(err => {
                    console.error("Error loading PDF preview", err);
                    loadingText.textContent = "Preview unavailable";
                });
            }
        });

        document.getElementById('btn-next').addEventListener('click', () => {
            socket.emit('slide-next');
            if (pdfDoc && pageNum < pdfDoc.numPages) {
                pageNum++;
                queueRenderPage(pageNum);
            }
            if(navigator.vibrate) navigator.vibrate(50);
        });

        document.getElementById('btn-prev').addEventListener('click', () => {
            socket.emit('slide-prev');
            if (pdfDoc && pageNum > 1) {
                pageNum--;
                queueRenderPage(pageNum);
            }
            if(navigator.vibrate) navigator.vibrate(50);
        });

        document.getElementById('btn-stop').addEventListener('click', () => {
            socket.emit('presentation-stop');
            window.location.href = 'index';
        });

        // Keyboard Shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
                e.preventDefault(); // prevent scrolling
                document.getElementById('btn-next').click();
            } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
                e.preventDefault();
                document.getElementById('btn-prev').click();
            }
        });
    </script>
</body>
</html>
